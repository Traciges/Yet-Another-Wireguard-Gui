<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own this service name on the system bus -->
  <policy user="root">
    <allow own="io.github.traciges.WireguardManager"/>
  </policy>

  <!-- Any user may send to and receive from the service -->
  <policy context="default">
    <allow send_destination="io.github.traciges.WireguardManager"/>
    <allow receive_sender="io.github.traciges.WireguardManager"/>
  </policy>
</busconfig>
